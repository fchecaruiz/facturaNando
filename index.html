<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>facturaNando</title>
  <link rel="stylesheet" href="facturaNando.css?v=20260410-1">
</head>
<body class="vibrant-mode">
  <div class="container">
    <h1>facturaNando</h1>
    <h3>Gestión de avisos y facturación</h3>

    <div class="card" id="aviso-form-section">
      <form id="aviso-form">
        <div class="grid-2">
          <div>
            <label for="numeroAviso">Nº Aviso</label>
            <input id="numeroAviso" type="text" placeholder="Ej: 1000001" />
            <label for="fechaAviso">Fecha</label>
            <div class="date-field">
              <input id="fechaAviso" type="date" />
              <button type="button" id="open-date-picker" class="date-picker-btn" aria-label="Abrir calendario">Cal</button>
            </div>
            <label for="aseguradora">Aseguradora</label>
            <div class="select-container">
              <select id="aseguradora"></select>
              <button type="button" id="manage-aseg-btn" class="manage-btn">Gestionar</button>
            </div>
          </div>
          <div>
            <label for="marca">Marca</label>
            <div class="select-container">
              <select id="marca"></select>
              <button type="button" id="manage-marca-btn" class="manage-btn">Gestionar</button>
            </div>

            <label for="tipoAparato">Tipo de Aparato</label>
            <div class="select-container">
              <select id="tipoAparato"></select>
              <button type="button" id="manage-tipo-btn" class="manage-btn">Gestionar</button>
            </div>

            <label for="codigoRecambio">Código Recambio (opcional)</label>
            <input id="codigoRecambio" type="text" />

          </div>
        </div>

        <div class="grid-2">
          <div>
            <label for="manoObra">Mano de Obra (€)</label>
            <input id="manoObra" type="number" step="0.01" min="0" value="0" />
          </div>
          <div>
            <label for="desplazamientoKm">Desplazamiento (km)</label>
            <input id="desplazamientoKm" type="number" step="0.1" min="0" value="0" />
          </div>
        </div>

        <label for="importeRecambios">Importe Recambios (€)</label>
        <input id="importeRecambios" type="number" step="0.01" min="0" value="0" />

        <button id="guardar-aviso-btn" type="submit">Guardar Aviso</button>
      </form>
    </div>

    <div class="card">
      <div class="search-row">
        <input id="buscadorAvisos" type="text" placeholder="Buscar avisos..." />
        <button id="limpiar-busqueda" class="manage-btn">Limpiar</button>
      </div>

      <div class="filter-controls">
        <select id="filtroAseguradora"></select>
        <select id="filtroAno"></select>
        <select id="filtroMes">
          <option value="">Mes</option>
          <option value="1">Ene</option><option value="2">Feb</option><option value="3">Mar</option>
          <option value="4">Abr</option><option value="5">May</option><option value="6">Jun</option>
          <option value="7">Jul</option><option value="8">Ago</option><option value="9">Sep</option>
          <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dic</option>
        </select>
        <button id="aplicar-filtro-btn">Aplicar Filtro</button>
      </div>

      <div class="bulk-actions">
        <button id="sel-all">Seleccionar todo</button>
        <button id="sel-none">Deseleccionar todo</button>
        <button id="sel-month">Seleccionar por mes</button>
        <button id="sel-year">Seleccionar por año</button>
        <button id="sel-week">Seleccionar por semana</button>
      </div>

      <div id="avisos-summary" class="avisos-summary"></div>

      <div id="avisos-list"></div>
    </div>

    <div class="card">
      <h4>Preview factura</h4>
      <div id="factura-preview"></div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:12px;">
        <button id="generar-factura-pdf" class="btn-pdf">Generar Factura en PDF</button>
        <button id="guardar-datos-btn">Guardar Datos de Facturación</button>
      </div>
    </div>

    <div class="card billing-card">
      <h4>Datos de facturación (editable)</h4>
      <div class="grid-2">
        <div class="billing-section">
          <label for="emisorNombre">Emisor - Nombre</label>
          <input id="emisorNombre" type="text" />
          <label for="emisorDireccion">Dirección</label>
          <input id="emisorDireccion" type="text" />
          <label for="emisorLocalidad">Localidad</label>
          <input id="emisorLocalidad" type="text" />
          <label for="emisorDni">DNI</label>
          <input id="emisorDni" type="text" />
        </div>
        <div class="billing-section">
          <label for="emisorTelf">Teléfono</label>
          <input id="emisorTelf" type="text" />
          <label for="emisorEmail">Email</label>
          <input id="emisorEmail" type="email" />
          <label for="emisorCuenta">Cuenta</label>
          <input id="emisorCuenta" type="text" />
          <label for="emisorBanco">Banco</label>
          <input id="emisorBanco" type="text" />
        </div>
      </div>

      <h4>Receptor</h4>
      <div class="grid-2">
        <div class="billing-section">
          <label for="receptorNombre">Nombre</label>
          <input id="receptorNombre" type="text" />
          <label for="receptorDireccion">Dirección</label>
          <input id="receptorDireccion" type="text" />
        </div>
        <div class="billing-section">
          <label for="receptorLocalidad">Localidad</label>
          <input id="receptorLocalidad" type="text" />
          <label for="receptorCif">CIF</label>
          <input id="receptorCif" type="text" />
          <label for="receptorEmail">Email</label>
          <input id="receptorEmail" type="email" />
          <label for="receptorTelf">Teléfono</label>
          <input id="receptorTelf" type="text" />
        </div>
      </div>
    </div>

  </div>

  <!-- Modal para gestionar opciones -->
  <div id="manage-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3 id="modal-title">Gestionar</h3>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Modal para selección (mes/año/semana) -->
  <div id="select-modal" class="modal">
    <div class="modal-content">
      <span class="close-select">&times;</span>
      <h3 id="select-modal-title">Seleccionar</h3>
      <div id="select-modal-body"></div>
      <div style="display:flex; gap:8px; margin-top:12px;">
        <button id="apply-selection-btn" class="manage-btn">Aplicar</button>
        <button id="cancel-selection-btn">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <!-- Librería jsPDF (incluida aquí para evitar dependencias dinámicas) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Script principal -->
  <script type="module" src="facturaNando.js?v=20260410-1"></script>
</body>
</html>
