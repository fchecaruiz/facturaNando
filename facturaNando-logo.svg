    <text x="712" y="164" fill="#13945F" stroke="#EAF3FF" stroke-width="1.5" paint-order="stroke" font-family="Segoe UI, Montserrat, Arial, sans-serif" font-size="104" font-weight="900" letter-spacing="0.4">
